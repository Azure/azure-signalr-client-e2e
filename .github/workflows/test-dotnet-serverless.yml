###############################################################################
#  .NET E2E (Serverless) — Management SDK tests                              #
#  Uses Serverless-mode Azure SignalR resource (no app server needed).        #
###############################################################################
name: ".NET E2E (Serverless)"

on:
  workflow_run:
    workflows: ["Build & Release"]
    types: [completed]
  workflow_dispatch:

env:
  MAX_ATTEMPTS: 3

jobs:
  test:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Download artifacts from latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download latest \
            --repo ${{ github.repository }} \
            --pattern 'client-e2e-artifacts.tar.gz' \
            --dir .
          mkdir -p artifacts
          tar -xzf client-e2e-artifacts.tar.gz -C artifacts

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run .NET Management E2E tests
        env:
          Azure__SignalR__ConnectionString: ${{ secrets.E2E_CONNECTION_STRING_SERVERLESS }}
        run: |
          if [[ -z "${Azure__SignalR__ConnectionString:-}" ]]; then
            echo "::warning::E2E_CONNECTION_STRING_SERVERLESS secret not set – skipping"
            exit 0
          fi
          DOTNET_DLL=$(find artifacts/dotnet -name 'Microsoft.Azure.SignalR.E2ETests.dll' -type f | head -1)
          if [[ -z "$DOTNET_DLL" ]]; then
            echo "::error::.NET test DLL not found"
            ls -laR artifacts/dotnet/ || true
            exit 1
          fi
          echo "Test DLL: $DOTNET_DLL"
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== Attempt $attempt / $MAX_ATTEMPTS ==="
            dotnet vstest "$DOTNET_DLL" \
              --logger:"console;verbosity=normal" \
              --testcasefilter:"FullyQualifiedName~Management" && exit 0
            echo "Attempt $attempt failed."
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              WAIT=$((RANDOM % 11 + 5))
              echo "Retrying in ${WAIT}s..."
              sleep $WAIT
            fi
          done
          echo "All $MAX_ATTEMPTS attempts failed."
          exit 1
