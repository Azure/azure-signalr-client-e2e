###############################################################################
#  Build & Release: compile all E2E test artifacts and publish as a GitHub   #
#  Release.  Downstream test workflows are triggered automatically via       #
#  workflow_run when this workflow completes.                                 #
###############################################################################
name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write            # create GitHub Releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: '6.0'

      - name: Build all artifacts
        run: |
          chmod +x ./build-artifacts.sh
          ./build-artifacts.sh ./artifacts

      - name: Create tarball
        run: |
          cd artifacts
          tar -czf ../client-e2e-artifacts.tar.gz .

      - name: Generate release metadata
        id: meta
        run: |
          echo "tag=artifacts-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

          # Write release notes to a file (avoids shell escaping issues)
          cat > release-notes.md <<'NOTES_EOF'
          Auto-built from commit ${{ github.sha }}

          ### Client SDK Commits
          NOTES_EOF
          # trim leading spaces from heredoc
          sed -i 's/^          //' release-notes.md

          # Submodule commits (dotnet, swift)
          git submodule foreach --quiet 'echo $name $(git rev-parse HEAD)' | while IFS= read -r line; do
            name=$(echo "$line" | cut -d' ' -f1)
            sha=$(echo "$line" | cut -d' ' -f2)
            short=$(echo "$sha" | cut -c1-7)
            url=$(git config --get submodule."$name".url | sed 's/\.git$//')
            echo "- **${name}**: [\`${short}\`](${url}/commit/${sha})" >> release-notes.md
          done

          # Java SDK version from pom.xml
          java_ver=$(grep -A1 '<artifactId>signalr</artifactId>' java/pom.xml | grep '<version>' | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          echo "- **java**: signalr \`${java_ver}\`" >> release-notes.md

      - name: Delete existing 'latest' release (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --yes 2>/dev/null || true

      - name: Delete existing 'latest' tag (if any)
        run: git push origin :refs/tags/latest 2>/dev/null || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            --title "Client E2E Artifacts (${{ steps.meta.outputs.tag }})" \
            --notes-file release-notes.md \
            --latest \
            client-e2e-artifacts.tar.gz
