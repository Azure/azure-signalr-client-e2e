###############################################################################
#  Build & Release: compile all E2E test artifacts and publish as a GitHub   #
#  Release.  Downstream test workflows are triggered automatically via       #
#  workflow_run when this workflow completes.                                 #
###############################################################################
name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write            # create GitHub Releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: '6.0'

      - name: Build all artifacts
        run: |
          chmod +x ./build-artifacts.sh
          ./build-artifacts.sh ./artifacts

      - name: Create tarball
        run: |
          cd artifacts
          tar -czf ../client-e2e-artifacts.tar.gz .

      - name: Generate release metadata
        id: meta
        run: |
          echo "tag=artifacts-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

          # Collect submodule commit info for traceability
          {
            echo 'notes<<EOF'
            echo "Auto-built from commit ${{ github.sha }}"
            echo ""
            echo "### Client SDK Commits"
            git submodule foreach --quiet '
              repo_url=$(git -C "$toplevel" config --get submodule."$name".url)
              echo "- **$name**: [\`$(git rev-parse --short HEAD)\`](${repo_url}/commit/$(git rev-parse HEAD))"
            '
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Delete existing 'latest' release (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --yes 2>/dev/null || true

      - name: Delete existing 'latest' tag (if any)
        run: git push origin :refs/tags/latest 2>/dev/null || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            --title "Client E2E Artifacts (${{ steps.meta.outputs.tag }})" \
            --notes "${{ steps.meta.outputs.notes }}" \
            --latest \
            client-e2e-artifacts.tar.gz
