###############################################################################
#  Swift macOS E2E — builds from source on macOS.                            #
#  Uses TestHubSwift (/test-swift) for hub isolation.                        #
#                                                                            #
#  The test server is started via `dotnet run` from source because the       #
#  pre-built IntegrationTestServer in the release artifact is a Linux        #
#  binary and cannot run on macOS.                                           #
###############################################################################
name: "Swift macOS E2E"

on:
  workflow_run:
    workflows: ["Build & Release"]
    types: [completed]
  workflow_dispatch:

env:
  MAX_ATTEMPTS: 3

jobs:
  test:
    runs-on: macos-14
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.0'

      - name: Setup .NET 8 (for test server)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Start test server (from source)
        env:
          Azure__SignalR__ConnectionString: ${{ secrets.E2E_CONNECTION_STRING }}
          ASPNETCORE_URLS: http://localhost:8080
        run: |
          if [[ -z "${Azure__SignalR__ConnectionString:-}" ]]; then
            echo "::warning::E2E_CONNECTION_STRING secret not set – skipping"
            exit 0
          fi
          cd server
          dotnet run -c Release -p:DefineConstants="USE_AZURE_SIGNALR" > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> "$GITHUB_ENV"

          for i in {1..30}; do
            HTTP_CODE=$(curl -sf -o /dev/null -w '%{http_code}' "http://localhost:8080/test-swift" 2>/dev/null || true)
            if [[ -n "$HTTP_CODE" && "$HTTP_CODE" != "000" ]]; then
              echo "Server ready (HTTP $HTTP_CODE)"
              break
            fi
            sleep 1
          done

      - name: Run Swift E2E tests (macOS, from source)
        env:
          E2E_CONNECTION_STRING: ${{ secrets.E2E_CONNECTION_STRING }}
          SIGNALR_INTEGRATION_TEST_URL: http://localhost:8080/test-swift
        run: |
          if [[ -z "${E2E_CONNECTION_STRING:-}" ]]; then
            echo "::warning::E2E_CONNECTION_STRING secret not set – skipping"
            exit 0
          fi
          cd swift
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== Attempt $attempt / $MAX_ATTEMPTS ==="
            swift test --filter SignalRClientIntegrationTests && break
            echo "Attempt $attempt failed."
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              WAIT=$((RANDOM % 11 + 5))
              echo "Retrying in ${WAIT}s..."
              sleep $WAIT
            fi
          done
          EXIT_CODE=$?

          echo "--- Server log ---"
          cat /tmp/server.log || true
          kill $SERVER_PID 2>/dev/null || true
          exit $EXIT_CODE
