###############################################################################
#  Swift Linux E2E — builds from source on ubuntu-latest to guarantee        #
#  binary compatibility.  Uses TestHubSwift (/test-swift) for isolation.      #
###############################################################################
name: "Swift Linux E2E"

on:
  workflow_run:
    workflows: ["Build & Release"]
    types: [completed]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Download artifacts from latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download latest \
            --repo ${{ github.repository }} \
            --pattern 'client-e2e-artifacts.tar.gz' \
            --dir .
          mkdir -p artifacts
          tar -xzf client-e2e-artifacts.tar.gz -C artifacts

      - name: Setup .NET 8 (for test server)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: '6.0'

      - name: Build Swift tests from source
        run: |
          if [[ ! -f artifacts/swift/Package.swift ]]; then
            echo "::error::Swift source not found in artifact (Package.swift missing)"
            ls -la artifacts/swift/ || true
            exit 1
          fi
          cd artifacts/swift
          # Remove pre-built .build directory to avoid stale binaries
          rm -rf .build
          swift build --build-tests
          echo "Swift tests built successfully on $(uname -s) $(uname -m)"

      - name: Run Swift E2E tests
        env:
          E2E_CONNECTION_STRING: ${{ secrets.E2E_CONNECTION_STRING }}
          SIGNALR_INTEGRATION_TEST_URL: http://localhost:8080/test-swift
        run: |
          set -euo pipefail

          if [[ -z "${E2E_CONNECTION_STRING:-}" ]]; then
            echo "::warning::E2E_CONNECTION_STRING secret not set – skipping"
            exit 0
          fi

          # Start test server
          export Azure__SignalR__ConnectionString="${E2E_CONNECTION_STRING}"
          export ASPNETCORE_URLS="http://localhost:8080"
          chmod +x artifacts/server/IntegrationTestServer || true
          artifacts/server/IntegrationTestServer > /tmp/server.log 2>&1 &
          SERVER_PID=$!

          for i in {1..30}; do
            HTTP_CODE=$(curl -sf -o /dev/null -w '%{http_code}' "http://localhost:8080/test-swift" 2>/dev/null || true)
            if [[ -n "$HTTP_CODE" && "$HTTP_CODE" != "000" ]]; then
              echo "Server ready (HTTP $HTTP_CODE)"
              break
            fi
            sleep 1
          done

          if [[ "$i" -eq 30 ]]; then
            echo "::error::Test server failed to start"
            cat /tmp/server.log || true
            exit 1
          fi

          # Run locally-built .xctest (same Swift runtime as build)
          cd artifacts/swift
          SWIFT_XCTEST=$(find .build -name '*.xctest' -type f 2>/dev/null | head -1)
          if [[ -z "$SWIFT_XCTEST" ]]; then
            echo "::error::Swift test binary not found after build"
            exit 1
          fi
          chmod +x "$SWIFT_XCTEST"
          "$SWIFT_XCTEST" SignalRClientIntegrationTests.IntegrationTests
          EXIT_CODE=$?

          echo "--- Server log ---"
          cat /tmp/server.log || true
          kill $SERVER_PID 2>/dev/null || true
          exit $EXIT_CODE
