###############################################################################
#  Reusable E2E Test Workflow                                                #
#                                                                            #
#  Called by dev.yml and stable.yml after their build jobs complete.          #
#  Runs .NET, Java, and Swift tests against pre-built artifacts.             #
###############################################################################
name: "E2E Tests"

on:
  workflow_call:
    inputs:
      artifact-name:
        description: "Name of the uploaded artifact to download"
        required: true
        type: string
      sdk-label:
        description: "Label for summary and badge (e.g. 'Dev SDK', 'Stable SDK')"
        required: true
        type: string
      badge-file:
        description: "Badge JSON filename on the badges branch (e.g. 'dev.json')"
        required: true
        type: string
    secrets:
      E2E_CONNECTION_STRING:
        required: false
      E2E_CONNECTION_STRING_SERVERLESS:
        required: false

permissions:
  contents: write

env:
  MAX_ATTEMPTS: 5

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  #  .NET Tests (Default + Serverless via matrix)
  # ═══════════════════════════════════════════════════════════════════════════
  test-dotnet:
    name: .NET (${{ matrix.mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: Default Mode
            filter: SignalRServiceE2EFacts
            secret-env: default
          - mode: Serverless Mode
            filter: Management
            secret-env: serverless
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: artifacts

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Run .NET E2E tests
        env:
          E2E_CS_DEFAULT: ${{ secrets.E2E_CONNECTION_STRING }}
          E2E_CS_SERVERLESS: ${{ secrets.E2E_CONNECTION_STRING_SERVERLESS }}
          SECRET_ENV: ${{ matrix.secret-env }}
        run: |
          if [[ "$SECRET_ENV" == "default" ]]; then
            export Azure__SignalR__ConnectionString="${E2E_CS_DEFAULT}"
          else
            export Azure__SignalR__ConnectionString="${E2E_CS_SERVERLESS}"
          fi
          if [[ -z "${Azure__SignalR__ConnectionString:-}" ]]; then
            echo "::warning::Connection string secret not set – skipping"
            exit 0
          fi
          DOTNET_DLL=$(find artifacts/dotnet -name 'Microsoft.Azure.SignalR.E2ETests.dll' -type f | head -1)
          if [[ -z "$DOTNET_DLL" ]]; then
            echo "::error::.NET test DLL not found"
            exit 1
          fi
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== Attempt $attempt / $MAX_ATTEMPTS ==="
            dotnet vstest "$DOTNET_DLL" \
              --logger:"console;verbosity=normal" \
              --testcasefilter:"FullyQualifiedName~${{ matrix.filter }}" && exit 0
            echo "Attempt $attempt failed."
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              WAIT=$(( (RANDOM % 11 + 5) * attempt ))
              echo "Retrying in ${WAIT}s..."
              sleep $WAIT
            fi
          done
          echo "All $MAX_ATTEMPTS attempts failed."
          exit 1

  # ═══════════════════════════════════════════════════════════════════════════
  #  Java
  # ═══════════════════════════════════════════════════════════════════════════
  test-java:
    name: Java
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: artifacts

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Run Java E2E tests
        env:
          E2E_CONNECTION_STRING: ${{ secrets.E2E_CONNECTION_STRING }}
        run: |
          set -euo pipefail
          if [[ -z "${E2E_CONNECTION_STRING:-}" ]]; then
            echo "::warning::E2E_CONNECTION_STRING secret not set – skipping"
            exit 0
          fi

          # Start test server
          export Azure__SignalR__ConnectionString="${E2E_CONNECTION_STRING}"
          export ASPNETCORE_URLS="http://localhost:8080"
          export SIGNALR_INTEGRATION_TEST_URL="http://localhost:8080/test-java"
          chmod +x artifacts/server/IntegrationTestServer || true
          artifacts/server/IntegrationTestServer > /tmp/server.log 2>&1 &
          SERVER_PID=$!

          for i in {1..30}; do
            HTTP_CODE=$(curl -sf -o /dev/null -w '%{http_code}' "http://localhost:8080/test-java" 2>/dev/null || true)
            if [[ -n "$HTTP_CODE" && "$HTTP_CODE" != "000" ]]; then
              echo "Server ready (HTTP $HTTP_CODE)"
              break
            fi
            sleep 1
          done
          if [[ "$i" -eq 30 ]]; then
            echo "::error::Test server failed to start"
            cat /tmp/server.log || true
            exit 1
          fi

          cd artifacts/java
          MAIN_JAR=$(find target -maxdepth 1 -name '*.jar' | head -1)
          DEP_JARS=$(find target/dependency -name '*.jar' 2>/dev/null | tr '\n' ':')
          CLASSPATH="${MAIN_JAR}:${DEP_JARS}target/test-classes"

          EXIT_CODE=1
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== Attempt $attempt / $MAX_ATTEMPTS ==="
            if java -cp "$CLASSPATH" org.junit.runner.JUnitCore IntegrationTests; then
              EXIT_CODE=0; break
            fi
            echo "Attempt $attempt failed."
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              WAIT=$(( (RANDOM % 11 + 5) * attempt ))
              echo "Retrying in ${WAIT}s..."
              sleep $WAIT
            fi
          done

          echo "--- Server log ---"
          cat /tmp/server.log || true
          kill $SERVER_PID 2>/dev/null || true
          exit $EXIT_CODE

  # ═══════════════════════════════════════════════════════════════════════════
  #  Swift (Ubuntu)
  # ═══════════════════════════════════════════════════════════════════════════
  test-swift-linux:
    name: Swift (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: artifacts

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: '6.0'

      - name: Build Swift tests from source
        run: |
          cd artifacts/swift
          rm -rf .build
          swift build --build-tests

      - name: Run Swift E2E tests
        env:
          E2E_CONNECTION_STRING: ${{ secrets.E2E_CONNECTION_STRING }}
          SIGNALR_INTEGRATION_TEST_URL: http://localhost:8080/test-swift
        run: |
          set -euo pipefail
          if [[ -z "${E2E_CONNECTION_STRING:-}" ]]; then
            echo "::warning::E2E_CONNECTION_STRING secret not set – skipping"
            exit 0
          fi

          export Azure__SignalR__ConnectionString="${E2E_CONNECTION_STRING}"
          export ASPNETCORE_URLS="http://localhost:8080"
          chmod +x artifacts/server/IntegrationTestServer || true
          artifacts/server/IntegrationTestServer > /tmp/server.log 2>&1 &
          SERVER_PID=$!

          for i in {1..30}; do
            HTTP_CODE=$(curl -sf -o /dev/null -w '%{http_code}' "http://localhost:8080/test-swift" 2>/dev/null || true)
            if [[ -n "$HTTP_CODE" && "$HTTP_CODE" != "000" ]]; then
              echo "Server ready (HTTP $HTTP_CODE)"
              break
            fi
            sleep 1
          done
          if [[ "$i" -eq 30 ]]; then
            echo "::error::Test server failed to start"
            cat /tmp/server.log || true
            exit 1
          fi

          cd artifacts/swift
          SWIFT_XCTEST=$(find .build -name '*.xctest' -type f 2>/dev/null | head -1)
          chmod +x "$SWIFT_XCTEST"

          EXIT_CODE=1
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== Attempt $attempt / $MAX_ATTEMPTS ==="
            if "$SWIFT_XCTEST" SignalRClientIntegrationTests.IntegrationTests; then
              EXIT_CODE=0; break
            fi
            echo "Attempt $attempt failed."
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              WAIT=$(( (RANDOM % 11 + 5) * attempt ))
              echo "Retrying in ${WAIT}s..."
              sleep $WAIT
            fi
          done

          echo "--- Server log ---"
          cat /tmp/server.log || true
          kill $SERVER_PID 2>/dev/null || true
          exit $EXIT_CODE

  # ═══════════════════════════════════════════════════════════════════════════
  #  Swift (macOS)
  # ═══════════════════════════════════════════════════════════════════════════
  test-swift-macos:
    name: Swift (macOS)
    runs-on: macos-14
    steps:
      - name: Checkout (for test server source)
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: artifacts

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.0'

      - name: Start test server (from source)
        env:
          Azure__SignalR__ConnectionString: ${{ secrets.E2E_CONNECTION_STRING }}
          ASPNETCORE_URLS: http://localhost:8080
        run: |
          if [[ -z "${Azure__SignalR__ConnectionString:-}" ]]; then
            echo "::warning::E2E_CONNECTION_STRING secret not set – skipping"
            exit 0
          fi
          cd server
          dotnet run -c Release -p:DefineConstants="USE_AZURE_SIGNALR" > /tmp/server.log 2>&1 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          for i in {1..30}; do
            HTTP_CODE=$(curl -sf -o /dev/null -w '%{http_code}' "http://localhost:8080/test-swift" 2>/dev/null || true)
            if [[ -n "$HTTP_CODE" && "$HTTP_CODE" != "000" ]]; then
              echo "Server ready (HTTP $HTTP_CODE)"
              break
            fi
            sleep 1
          done

      - name: Run Swift E2E tests
        env:
          E2E_CONNECTION_STRING: ${{ secrets.E2E_CONNECTION_STRING }}
          SIGNALR_INTEGRATION_TEST_URL: http://localhost:8080/test-swift
        run: |
          if [[ -z "${E2E_CONNECTION_STRING:-}" ]]; then exit 0; fi
          cd artifacts/swift
          rm -rf .build

          EXIT_CODE=1
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== Attempt $attempt / $MAX_ATTEMPTS ==="
            if swift test --filter SignalRClientIntegrationTests; then
              EXIT_CODE=0; break
            fi
            echo "Attempt $attempt failed."
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              WAIT=$(( (RANDOM % 11 + 5) * attempt ))
              echo "Retrying in ${WAIT}s..."
              sleep $WAIT
            fi
          done

          echo "--- Server log ---"
          cat /tmp/server.log || true
          kill ${SERVER_PID:-0} 2>/dev/null || true
          exit $EXIT_CODE

  # ═══════════════════════════════════════════════════════════════════════════
  #  Summary
  # ═══════════════════════════════════════════════════════════════════════════
  summary:
    name: Summary
    needs: [test-dotnet, test-java, test-swift-linux, test-swift-macos]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Calculate results
        id: results
        run: |
          PASSED=0; TOTAL=4
          [[ "${{ needs.test-dotnet.result }}" == "success" ]] && ((PASSED++)) || true
          [[ "${{ needs.test-java.result }}" == "success" ]] && ((PASSED++)) || true
          [[ "${{ needs.test-swift-linux.result }}" == "success" ]] && ((PASSED++)) || true
          [[ "${{ needs.test-swift-macos.result }}" == "success" ]] && ((PASSED++)) || true
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          if [[ $PASSED -eq $TOTAL ]]; then echo "color=brightgreen" >> "$GITHUB_OUTPUT"
          elif [[ $PASSED -gt 0 ]]; then echo "color=yellow" >> "$GITHUB_OUTPUT"
          else echo "color=red" >> "$GITHUB_OUTPUT"; fi

      - name: Job summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## ${{ inputs.sdk-label }} — ${{ steps.results.outputs.passed }}/${{ steps.results.outputs.total }} tests passed

          | Test | Status |
          |------|--------|
          | .NET (Default + Serverless) | ${{ needs.test-dotnet.result == 'success' && '✅' || '❌' }} |
          | Java | ${{ needs.test-java.result == 'success' && '✅' || '❌' }} |
          | Swift (Ubuntu) | ${{ needs.test-swift-linux.result == 'success' && '✅' || '❌' }} |
          | Swift (macOS) | ${{ needs.test-swift-macos.result == 'success' && '✅' || '❌' }} |
          EOF

      - name: Update badge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PASSED=${{ steps.results.outputs.passed }}
          TOTAL=${{ steps.results.outputs.total }}
          COLOR=${{ steps.results.outputs.color }}

          # Try to clone the badges branch; create it if it doesn't exist
          git clone --single-branch --branch badges \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" \
            badge-repo 2>/dev/null || {
            mkdir -p badge-repo && cd badge-repo
            git init && git checkout --orphan badges
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
            cd ..
          }

          cd badge-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "{\"schemaVersion\":1,\"label\":\"${{ inputs.sdk-label }}\",\"message\":\"${PASSED}/${TOTAL} passed\",\"color\":\"${COLOR}\"}" > "${{ inputs.badge-file }}"
          git add "${{ inputs.badge-file }}"
          git diff --cached --quiet || {
            git commit -m "Update ${{ inputs.sdk-label }} badge: ${PASSED}/${TOTAL} passed"
            git push origin badges 2>/dev/null || git push --set-upstream origin badges
          }
