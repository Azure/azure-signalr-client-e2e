###############################################################################
#  Java E2E — uses TestHubJava (/test-java) for hub isolation.               #
###############################################################################
name: "Java E2E"

on:
  workflow_run:
    workflows: ["Build & Release"]
    types: [completed]
  workflow_dispatch:

env:
  MAX_ATTEMPTS: 3

jobs:
  test:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Download artifacts from latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download latest \
            --repo ${{ github.repository }} \
            --pattern 'client-e2e-artifacts.tar.gz' \
            --dir .
          mkdir -p artifacts
          tar -xzf client-e2e-artifacts.tar.gz -C artifacts

      - name: Setup .NET 8 (for test server)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Run Java E2E tests
        env:
          E2E_CONNECTION_STRING: ${{ secrets.E2E_CONNECTION_STRING }}
        run: |
          set -euo pipefail

          if [[ -z "${E2E_CONNECTION_STRING:-}" ]]; then
            echo "::warning::E2E_CONNECTION_STRING secret not set – skipping"
            exit 0
          fi

          # Start test server
          export Azure__SignalR__ConnectionString="${E2E_CONNECTION_STRING}"
          export ASPNETCORE_URLS="http://localhost:8080"
          export SIGNALR_INTEGRATION_TEST_URL="http://localhost:8080/test-java"
          chmod +x artifacts/server/IntegrationTestServer || true
          artifacts/server/IntegrationTestServer > /tmp/server.log 2>&1 &
          SERVER_PID=$!

          for i in {1..30}; do
            HTTP_CODE=$(curl -sf -o /dev/null -w '%{http_code}' "http://localhost:8080/test-java" 2>/dev/null || true)
            if [[ -n "$HTTP_CODE" && "$HTTP_CODE" != "000" ]]; then
              echo "Server ready (HTTP $HTTP_CODE)"
              break
            fi
            sleep 1
          done

          if [[ "$i" -eq 30 ]]; then
            echo "::error::Test server failed to start"
            cat /tmp/server.log || true
            exit 1
          fi

          # Run tests with pre-built jars
          cd artifacts/java
          MAIN_JAR=$(find target -maxdepth 1 -name '*.jar' | head -1)
          DEP_JARS=$(find target/dependency -name '*.jar' 2>/dev/null | tr '\n' ':')
          CLASSPATH="${MAIN_JAR}:${DEP_JARS}target/test-classes"
          echo "Classpath: $CLASSPATH"
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== Attempt $attempt / $MAX_ATTEMPTS ==="
            java -cp "$CLASSPATH" org.junit.runner.JUnitCore IntegrationTests && break
            echo "Attempt $attempt failed."
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              WAIT=$((RANDOM % 11 + 5))
              echo "Retrying in ${WAIT}s..."
              sleep $WAIT
            fi
          done
          EXIT_CODE=$?

          echo "--- Server log ---"
          cat /tmp/server.log || true
          kill $SERVER_PID 2>/dev/null || true
          exit $EXIT_CODE
