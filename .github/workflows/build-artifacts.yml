###############################################################################
#  Build client E2E test artifacts and publish as a GitHub Release.          #
#                                                                            #
#  Triggered on every push to master.  Produces a tarball containing:        #
#    server/   - published .NET test-server                                  #
#    dotnet/   - .NET E2E test DLLs                                          #
#    java/     - compiled Java test classes + pom.xml                         #
#    swift/    - Swift test binaries                                          #
#    run-from-artifacts.sh                                                   #
#                                                                            #
#  The release is tagged "artifacts-<short-sha>" and marked as latest.       #
#  Downstream ADO pipelines download the latest release.                     #
###############################################################################
name: Build E2E Artifacts

on:
  push:
    branches: [master]
  workflow_dispatch:         # allow manual trigger

permissions:
  contents: write            # needed to create GitHub Releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # Swift client requires macOS (URLSession async APIs not available on Linux).
      # Swift build is skipped on ubuntu-latest; add a macOS job if needed later.

      - name: Build all artifacts
        run: |
          chmod +x ./build-artifacts.sh
          ./build-artifacts.sh ./artifacts

      - name: Create tarball
        run: |
          cd artifacts
          tar -czf ../client-e2e-artifacts.tar.gz .

      - name: Generate release tag
        id: tag
        run: echo "tag=artifacts-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Delete existing 'latest' release (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --yes 2>/dev/null || true

      - name: Delete existing 'latest' tag (if any)
        run: git push origin :refs/tags/latest 2>/dev/null || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            --title "E2E Artifacts (${{ steps.tag.outputs.tag }})" \
            --notes "Auto-built from commit ${{ github.sha }}" \
            --latest \
            client-e2e-artifacts.tar.gz
