###############################################################################
#  Client E2E (Dev SDK) — build and test all client SDKs against their      #
#  latest development versions.                                              #
#                                                                            #
#  .NET  → azure-signalr@dev submodule (built from source)                  #
#  Java  → latest (including preview) on Maven Central                       #
#  Swift → signalr-client-swift@dev submodule (built from source)           #
#                                                                            #
#  Triggered after Sync Submodules completes, or manually.                   #
###############################################################################
name: "Client E2E (Dev SDK)"

on:
  workflow_run:
    workflows: ["Sync Submodules"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

env:
  MAX_ATTEMPTS: 3

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  #  Build
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: Build
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      dotnet-version: ${{ steps.versions.outputs.dotnet }}
      dotnet-full: ${{ steps.versions.outputs.dotnet-full }}
      java-version: ${{ steps.versions.outputs.java }}
      swift-version: ${{ steps.versions.outputs.swift }}
      swift-full: ${{ steps.versions.outputs.swift-full }}
      has-changes: ${{ steps.check.outputs.has-changes }}
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Check for changes since last release
        id: check
        run: |
          git fetch --tags origin 2>/dev/null || true
          if git rev-parse latest-dev >/dev/null 2>&1; then
            LATEST=$(git rev-parse latest-dev)
            CURRENT=$(git rev-parse HEAD)
            if [[ "$LATEST" == "$CURRENT" ]]; then
              echo "── No changes since last dev release (HEAD == latest-dev) ──"
              echo "has-changes=false" >> "$GITHUB_OUTPUT"
            else
              echo "── Changes detected: latest-dev=$LATEST, HEAD=$CURRENT ──"
              echo "has-changes=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "── No latest-dev tag found — first run ──"
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Reuse existing artifacts (no changes)
        if: steps.check.outputs.has-changes == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "── Downloading existing artifacts from latest-dev release ──"
          mkdir -p artifacts
          gh release download latest-dev -p 'e2e-artifacts-dev.tar.gz'
          tar -xzf e2e-artifacts-dev.tar.gz -C artifacts
          echo "  ✓ Reused existing artifacts"

      - name: Setup .NET 8
        if: steps.check.outputs.has-changes == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup JDK 21
        if: steps.check.outputs.has-changes == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Swift
        if: steps.check.outputs.has-changes == 'true'
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: '6.0'

      - name: Collect SDK versions
        if: steps.check.outputs.has-changes == 'true'
        id: versions
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "Client E2E (Dev SDK) — Build"
          echo "Triggered by: ${{ github.event_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "════════════════════════════════════════════════════════════"

          DOTNET_SHA=$(git -C dotnet rev-parse --short HEAD)
          DOTNET_FULL=$(git -C dotnet rev-parse HEAD)
          SWIFT_SHA=$(git -C swift rev-parse --short HEAD)
          SWIFT_FULL=$(git -C swift rev-parse HEAD)
          JAVA_VER=$(grep -A1 '<artifactId>signalr</artifactId>' java/pom.xml \
            | grep '<version>' | sed 's/.*<version>\(.*\)<\/version>.*/\1/')

          echo ""
          echo "── Dev SDK Versions ──"
          echo "  .NET:  $DOTNET_SHA ($DOTNET_FULL)"
          echo "         source: Azure/azure-signalr@dev submodule"
          echo "  Java:  $JAVA_VER"
          echo "         source: com.microsoft.signalr:signalr from pom.xml (Maven Central)"
          echo "  Swift: $SWIFT_SHA ($SWIFT_FULL)"
          echo "         source: dotnet/signalr-client-swift@dev submodule"
          echo ""

          echo "dotnet=$DOTNET_SHA" >> "$GITHUB_OUTPUT"
          echo "dotnet-full=$DOTNET_FULL" >> "$GITHUB_OUTPUT"
          echo "swift=$SWIFT_SHA" >> "$GITHUB_OUTPUT"
          echo "swift-full=$SWIFT_FULL" >> "$GITHUB_OUTPUT"
          echo "java=$JAVA_VER" >> "$GITHUB_OUTPUT"

      - name: Build all artifacts
        if: steps.check.outputs.has-changes == 'true'
        run: |
          chmod +x ./build-artifacts.sh
          ./build-artifacts.sh ./artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: e2e-artifacts-dev
          path: artifacts/
          retention-days: 7

      - name: Package release tarball
        if: steps.check.outputs.has-changes == 'true'
        run: |
          tar -czf e2e-artifacts-dev.tar.gz -C artifacts .
          echo "Archive size: $(du -h e2e-artifacts-dev.tar.gz | cut -f1)"

      - name: Upload release tarball
        if: steps.check.outputs.has-changes == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: e2e-release-tarball-dev
          path: e2e-artifacts-dev.tar.gz
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  #  Release (only when changes detected, parallel with tests)
  # ═══════════════════════════════════════════════════════════════════════════
  release:
    name: Release
    needs: build
    if: needs.build.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download release tarball
        uses: actions/download-artifact@v7
        with:
          name: e2e-release-tarball-dev

      - name: Create release notes
        run: |
          DOTNET_SHA=${{ needs.build.outputs.dotnet-version }}
          DOTNET_FULL=${{ needs.build.outputs.dotnet-full }}
          SWIFT_SHA=${{ needs.build.outputs.swift-version }}
          SWIFT_FULL=${{ needs.build.outputs.swift-full }}
          JAVA_VER=${{ needs.build.outputs.java-version }}

          {
            echo '### Dev SDK Versions'
            echo ''
            echo '| SDK | Version | Source |'
            echo '|-----|---------|--------|'
            echo "| .NET | [\`Azure/azure-signalr@${DOTNET_SHA}\`](https://github.com/Azure/azure-signalr/commit/${DOTNET_FULL}) | Submodule (dev branch) |"
            echo "| Java | [\`com.microsoft.signalr:signalr@${JAVA_VER}\`](https://central.sonatype.com/artifact/com.microsoft.signalr/signalr/${JAVA_VER}) | Maven Central |"
            echo "| Swift | [\`dotnet/signalr-client-swift@${SWIFT_SHA}\`](https://github.com/dotnet/signalr-client-swift/commit/${SWIFT_FULL}) | Submodule (dev branch) |"
          } > release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="dev-$(date -u +%Y%m%d-%H%M%S)"
          echo "── Publishing GitHub Release ──"
          echo "  Tag:   $TAG"
          echo "  Title: Client E2E Artifacts (Dev) - $(date -u +%Y%m%d-%H%M%S)"
          echo ""
          echo "── Release Notes ──"
          cat release-notes.md
          echo ""

          gh release create "$TAG" \
            --title "Client E2E Artifacts (Dev) - $(date -u +%Y%m%d-%H%M%S)" \
            --notes-file release-notes.md \
            --latest=false \
            e2e-artifacts-dev.tar.gz
          echo "  ✓ Timestamped release created"

          # Update the latest-dev release (delete old release object, recreate)
          echo ""
          echo "── Updating latest-dev release ──"
          gh release delete latest-dev --yes 2>/dev/null && echo "  Deleted old latest-dev release" || echo "  No previous latest-dev release to delete"
          git tag -f latest-dev
          git push origin latest-dev --force
          echo "  ✓ latest-dev tag moved to $(git rev-parse --short HEAD)"
          gh release create latest-dev \
            --title "Client E2E Artifacts (Dev) - Latest" \
            --notes-file release-notes.md \
            --latest=false \
            e2e-artifacts-dev.tar.gz
          echo "  ✓ latest-dev release created"

  # ═══════════════════════════════════════════════════════════════════════════
  #  Tests (reusable workflow, parallel with release)
  # ═══════════════════════════════════════════════════════════════════════════
  tests:
    needs: build
    uses: ./.github/workflows/test-e2e.yml
    with:
      artifact-name: e2e-artifacts-dev
      sdk-label: "Dev SDK"
      badge-file: dev.json
    secrets: inherit
