###############################################################################
#  Sync Submodules — periodically check upstream SDK repos for updates.      #
#                                                                            #
#  Runs daily. If any submodule (dotnet/, swift/) has a newer commit on      #
#  its tracked branch, this workflow commits the update and pushes to        #
#  master, which automatically triggers Build & Release → all test           #
#  workflows.                                                                #
###############################################################################
name: "Sync Submodules"

on:
  schedule:
    - cron: '0 0 * * *'     # daily at UTC 00:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update submodules to latest upstream
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git submodule update --remote

          if git diff --quiet; then
            echo "No submodule updates found."
            exit 0
          fi

          echo "Submodule updates detected:"
          git diff --submodule=short

          git add -A
          git commit -m "chore: sync submodules to latest upstream

          $(git diff --cached --submodule=short)"
          git push origin master
