###############################################################################
#  Client E2E (Stable SDK) — build and test all client SDKs against their   #
#  latest stable (non-preview) released versions.                            #
#                                                                            #
#  .NET  → latest stable on NuGet (checkout matching tag in submodule)      #
#  Java  → latest stable (non-preview) on Maven Central                     #
#  Swift → latest stable (non-preview) GitHub tag                           #
#                                                                            #
#  Triggered after Client E2E (Dev SDK) completes, or manually.             #
###############################################################################
name: "Client E2E (Stable SDK)"

on:
  workflow_run:
    workflows: ["Client E2E (Dev SDK)"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

env:
  MAX_ATTEMPTS: 3

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  #  Build — resolve stable versions, checkout matching tags, build
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: Build
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion != 'cancelled' }}
    runs-on: ubuntu-latest
    outputs:
      dotnet-version: ${{ steps.versions.outputs.dotnet }}
      java-version: ${{ steps.versions.outputs.java }}
      swift-version: ${{ steps.versions.outputs.swift }}
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Resolve stable SDK versions
        id: versions
        run: |
          set -euo pipefail

          echo "════════════════════════════════════════════════════════════"
          echo "Client E2E (Stable SDK) — Build"
          echo "Triggered by: ${{ github.event_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "════════════════════════════════════════════════════════════"

          echo ""
          echo "── Current submodule state (before version resolution) ──"
          git submodule foreach --quiet 'echo "  $name: $(git rev-parse --short HEAD)"'
          CURRENT_JAVA=$(grep -A1 '<artifactId>signalr</artifactId>' java/pom.xml | grep '<version>' | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          echo "  java (pom.xml): $CURRENT_JAVA"

          echo ""
          echo "── Resolving stable versions from registries ──"

          # .NET: latest stable (non-preview) from NuGet
          echo ""
          echo "  [.NET] Querying NuGet API..."
          DOTNET_VER=$(curl -sL "https://api.nuget.org/v3-flatcontainer/microsoft.azure.signalr/index.json" \
            | jq -r '[.versions[] | select(contains("-") | not)] | last')
          echo "  [.NET] Latest stable (non-preview): $DOTNET_VER"
          echo "  [.NET] Source: https://api.nuget.org/v3-flatcontainer/microsoft.azure.signalr/index.json"
          echo "  [.NET] Filter: exclude versions containing '-' (preview/rc/alpha/beta)"
          echo "dotnet=$DOTNET_VER" >> "$GITHUB_OUTPUT"

          # Java: latest stable (non-preview) from Maven Central
          echo ""
          echo "  [Java] Querying Maven Central maven-metadata.xml..."
          JAVA_VER=$(curl -s "https://repo1.maven.org/maven2/com/microsoft/signalr/signalr/maven-metadata.xml" \
            | grep '<version>' | sed 's/.*<version>\(.*\)<\/version>.*/\1/' \
            | grep -v 'preview\|alpha\|beta\|rc' | sort -V | tail -1)
          echo "  [Java] Latest stable (non-preview): $JAVA_VER"
          echo "  [Java] Source: repo1.maven.org/maven2/com/microsoft/signalr/signalr/maven-metadata.xml"
          echo "  [Java] Filter: exclude preview|alpha|beta|rc, sort -V, take last"
          echo "  [Java] Current pom.xml version: $CURRENT_JAVA → will be overwritten to $JAVA_VER"
          echo "java=$JAVA_VER" >> "$GITHUB_OUTPUT"

          # Swift: latest stable (non-preview) tag from GitHub
          echo ""
          echo "  [Swift] Querying GitHub tags API..."
          SWIFT_TAG=$(curl -s "https://api.github.com/repos/dotnet/signalr-client-swift/tags?per_page=100" \
            | jq -r '[.[].name | select(test("preview|alpha|beta|rc") | not)] | first')
          echo "  [Swift] Latest stable (non-preview) tag: $SWIFT_TAG"
          echo "  [Swift] Source: api.github.com/repos/dotnet/signalr-client-swift/tags"
          echo "  [Swift] Filter: exclude preview|alpha|beta|rc, take first (newest)"
          echo "swift=$SWIFT_TAG" >> "$GITHUB_OUTPUT"

          echo ""
          echo "── Stable SDK Versions Summary ──"
          echo "  .NET:  $DOTNET_VER (NuGet, non-preview)"
          echo "  Java:  $JAVA_VER (Maven Central, non-preview)"
          echo "  Swift: $SWIFT_TAG (GitHub tag, non-preview)"
          echo ""

      - name: Checkout .NET SDK at stable tag
        run: |
          echo ""
          echo "── .NET SDK: Checking out stable tag ──"
          cd dotnet
          echo "  Fetching tags from origin..."
          git fetch --tags origin
          DOTNET_VER="${{ steps.versions.outputs.dotnet }}"
          echo "  Target version: $DOTNET_VER"
          echo "  Current HEAD: $(git rev-parse --short HEAD) ($(git log -1 --format='%s' HEAD))"
          # Try common tag patterns: v1.33.0 or 1.33.0
          echo "  Searching for tag matching: ^v?${DOTNET_VER}$"
          MATCHING_TAGS=$(git tag -l | grep -E "^v?${DOTNET_VER}$" || true)
          echo "  Matching tags found: ${MATCHING_TAGS:-none}"
          TAG=$(echo "$MATCHING_TAGS" | head -1)
          if [[ -n "$TAG" ]]; then
            echo "  ✓ Checking out .NET SDK tag: $TAG"
            git checkout "$TAG"
            echo "  After checkout: $(git rev-parse --short HEAD)"
          else
            echo "  ⚠ No tag found for .NET SDK $DOTNET_VER — using dev HEAD"
            echo "  Available tags (last 10): $(git tag -l --sort=-v:refname | head -10 | tr '\n' ' ')"
            echo "::warning::No tag found for .NET SDK $DOTNET_VER — using dev HEAD"
          fi

      - name: Update Java SDK to stable version
        run: |
          echo ""
          echo "── Java SDK: Updating pom.xml to stable version ──"
          JAVA_VER="${{ steps.versions.outputs.java }}"
          BEFORE=$(grep -A1 '<artifactId>signalr</artifactId>' java/pom.xml | grep '<version>' | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          echo "  Before: $BEFORE"
          sed -i "/<artifactId>signalr<\/artifactId>/{n;s|<version>.*</version>|<version>${JAVA_VER}</version>|}" java/pom.xml
          AFTER=$(grep -A1 '<artifactId>signalr</artifactId>' java/pom.xml | grep '<version>' | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          echo "  After:  $AFTER"
          if [[ "$BEFORE" == "$AFTER" ]]; then
            echo "  (no change — already at stable version)"
          else
            echo "  ✓ Updated com.microsoft.signalr:signalr $BEFORE → $AFTER"
          fi

      - name: Checkout Swift SDK at stable tag
        run: |
          echo ""
          echo "── Swift SDK: Checking out stable tag ──"
          cd swift
          echo "  Fetching tags from origin..."
          git fetch --tags origin
          SWIFT_TAG="${{ steps.versions.outputs.swift }}"
          echo "  Target tag: $SWIFT_TAG"
          echo "  Current HEAD: $(git rev-parse --short HEAD) ($(git log -1 --format='%s' HEAD))"
          if [[ -n "$SWIFT_TAG" && "$SWIFT_TAG" != "null" ]]; then
            echo "  ✓ Checking out Swift SDK tag: $SWIFT_TAG"
            git checkout "$SWIFT_TAG"
            echo "  After checkout: $(git rev-parse --short HEAD)"
          else
            echo "  ⚠ No stable Swift tag found — using dev HEAD"
            echo "  Available tags (last 10): $(git tag -l --sort=-v:refname | head -10 | tr '\n' ' ')"
            echo "::warning::No stable Swift tag found — using dev HEAD"
          fi

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: '6.0'

      - name: Build all artifacts
        run: |
          chmod +x ./build-artifacts.sh
          ./build-artifacts.sh ./artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-stable
          path: artifacts/
          retention-days: 7

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ""
          echo "── Publishing Stable GitHub Release ──"

          cat > release-notes.md <<EOF
          ### Stable SDK Versions
          - **.NET**: \`${{ steps.versions.outputs.dotnet }}\`
          - **Java**: \`${{ steps.versions.outputs.java }}\`
          - **Swift**: \`${{ steps.versions.outputs.swift }}\`
          EOF

          echo "  Release notes:"
          cat release-notes.md | sed 's/^/    /'

          tar -czf e2e-artifacts-stable.tar.gz -C artifacts .
          ARCHIVE_SIZE=$(du -h e2e-artifacts-stable.tar.gz | cut -f1)
          echo "  Archive size: $ARCHIVE_SIZE"

          TAG="stable-$(date -u +%Y%m%d-%H%M%S)"
          TITLE="Client E2E Artifacts (Stable) - $(date -u +%Y%m%d-%H%M%S)"
          echo "  Tag:   $TAG"
          echo "  Title: $TITLE"

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes-file release-notes.md \
            --latest=false \
            e2e-artifacts-stable.tar.gz
          echo "  ✓ Timestamped release created"

          # Update the latest-stable release (delete old release object, recreate)
          echo ""
          echo "── Updating latest-stable release ──"
          gh release delete latest-stable --yes 2>/dev/null && echo "  Deleted old latest-stable release" || echo "  No previous latest-stable release to delete"
          git tag -f latest-stable
          git push origin latest-stable --force
          echo "  ✓ latest-stable tag moved to $(git rev-parse --short HEAD)"
          gh release create latest-stable \
            --title "Client E2E Artifacts (Stable) - Latest" \
            --notes-file release-notes.md \
            --latest=false \
            e2e-artifacts-stable.tar.gz
          echo "  ✓ latest-stable release created"

  # ═══════════════════════════════════════════════════════════════════════════
  #  Tests
  # ═══════════════════════════════════════════════════════════════════════════
  test-dotnet-default:
    name: .NET (Default Mode)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: e2e-artifacts-stable
          path: artifacts

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run .NET SignalR E2E tests
        env:
          Azure__SignalR__ConnectionString: ${{ secrets.E2E_CONNECTION_STRING }}
        run: |
          if [[ -z "${Azure__SignalR__ConnectionString:-}" ]]; then
            echo "::warning::E2E_CONNECTION_STRING secret not set – skipping"
            exit 0
          fi
          DOTNET_DLL=$(find artifacts/dotnet -name 'Microsoft.Azure.SignalR.E2ETests.dll' -type f | head -1)
          if [[ -z "$DOTNET_DLL" ]]; then
            echo "::error::.NET test DLL not found"
            exit 1
          fi
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== Attempt $attempt / $MAX_ATTEMPTS ==="
            dotnet vstest "$DOTNET_DLL" \
              --logger:"console;verbosity=normal" \
              --testcasefilter:"FullyQualifiedName~SignalRServiceE2EFacts" && exit 0
            echo "Attempt $attempt failed."
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              WAIT=$((RANDOM % 11 + 5))
              echo "Retrying in ${WAIT}s..."
              sleep $WAIT
            fi
          done
          echo "All $MAX_ATTEMPTS attempts failed."
          exit 1

  test-dotnet-serverless:
    name: .NET (Serverless Mode)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: e2e-artifacts-stable
          path: artifacts

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run .NET Management E2E tests
        env:
          Azure__SignalR__ConnectionString: ${{ secrets.E2E_CONNECTION_STRING_SERVERLESS }}
        run: |
          if [[ -z "${Azure__SignalR__ConnectionString:-}" ]]; then
            echo "::warning::E2E_CONNECTION_STRING_SERVERLESS secret not set – skipping"
            exit 0
          fi
          DOTNET_DLL=$(find artifacts/dotnet -name 'Microsoft.Azure.SignalR.E2ETests.dll' -type f | head -1)
          if [[ -z "$DOTNET_DLL" ]]; then
            echo "::error::.NET test DLL not found"
            exit 1
          fi
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== Attempt $attempt / $MAX_ATTEMPTS ==="
            dotnet vstest "$DOTNET_DLL" \
              --logger:"console;verbosity=normal" \
              --testcasefilter:"FullyQualifiedName~Management" && exit 0
            echo "Attempt $attempt failed."
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              WAIT=$((RANDOM % 11 + 5))
              echo "Retrying in ${WAIT}s..."
              sleep $WAIT
            fi
          done
          echo "All $MAX_ATTEMPTS attempts failed."
          exit 1

  test-java:
    name: Java
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: e2e-artifacts-stable
          path: artifacts

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Run Java E2E tests
        env:
          E2E_CONNECTION_STRING: ${{ secrets.E2E_CONNECTION_STRING }}
        run: |
          set -euo pipefail
          if [[ -z "${E2E_CONNECTION_STRING:-}" ]]; then
            echo "::warning::E2E_CONNECTION_STRING secret not set – skipping"
            exit 0
          fi

          # Start test server
          export Azure__SignalR__ConnectionString="${E2E_CONNECTION_STRING}"
          export ASPNETCORE_URLS="http://localhost:8080"
          export SIGNALR_INTEGRATION_TEST_URL="http://localhost:8080/test-java"
          chmod +x artifacts/server/IntegrationTestServer || true
          artifacts/server/IntegrationTestServer > /tmp/server.log 2>&1 &
          SERVER_PID=$!

          for i in {1..30}; do
            HTTP_CODE=$(curl -sf -o /dev/null -w '%{http_code}' "http://localhost:8080/test-java" 2>/dev/null || true)
            if [[ -n "$HTTP_CODE" && "$HTTP_CODE" != "000" ]]; then
              echo "Server ready (HTTP $HTTP_CODE)"
              break
            fi
            sleep 1
          done
          if [[ "$i" -eq 30 ]]; then
            echo "::error::Test server failed to start"
            cat /tmp/server.log || true
            exit 1
          fi

          cd artifacts/java
          MAIN_JAR=$(find target -maxdepth 1 -name '*.jar' | head -1)
          DEP_JARS=$(find target/dependency -name '*.jar' 2>/dev/null | tr '\n' ':')
          CLASSPATH="${MAIN_JAR}:${DEP_JARS}target/test-classes"

          EXIT_CODE=1
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== Attempt $attempt / $MAX_ATTEMPTS ==="
            if java -cp "$CLASSPATH" org.junit.runner.JUnitCore IntegrationTests; then
              EXIT_CODE=0; break
            fi
            echo "Attempt $attempt failed."
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              WAIT=$((RANDOM % 11 + 5))
              echo "Retrying in ${WAIT}s..."
              sleep $WAIT
            fi
          done

          echo "--- Server log ---"
          cat /tmp/server.log || true
          kill $SERVER_PID 2>/dev/null || true
          exit $EXIT_CODE

  test-swift-linux:
    name: Swift (Ubuntu)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: e2e-artifacts-stable
          path: artifacts

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: '6.0'

      - name: Build Swift tests from source
        run: |
          cd artifacts/swift
          rm -rf .build
          swift build --build-tests

      - name: Run Swift E2E tests
        env:
          E2E_CONNECTION_STRING: ${{ secrets.E2E_CONNECTION_STRING }}
          SIGNALR_INTEGRATION_TEST_URL: http://localhost:8080/test-swift
        run: |
          set -euo pipefail
          if [[ -z "${E2E_CONNECTION_STRING:-}" ]]; then
            echo "::warning::E2E_CONNECTION_STRING secret not set – skipping"
            exit 0
          fi

          export Azure__SignalR__ConnectionString="${E2E_CONNECTION_STRING}"
          export ASPNETCORE_URLS="http://localhost:8080"
          chmod +x artifacts/server/IntegrationTestServer || true
          artifacts/server/IntegrationTestServer > /tmp/server.log 2>&1 &
          SERVER_PID=$!

          for i in {1..30}; do
            HTTP_CODE=$(curl -sf -o /dev/null -w '%{http_code}' "http://localhost:8080/test-swift" 2>/dev/null || true)
            if [[ -n "$HTTP_CODE" && "$HTTP_CODE" != "000" ]]; then
              echo "Server ready (HTTP $HTTP_CODE)"
              break
            fi
            sleep 1
          done
          if [[ "$i" -eq 30 ]]; then
            echo "::error::Test server failed to start"
            cat /tmp/server.log || true
            exit 1
          fi

          cd artifacts/swift
          SWIFT_XCTEST=$(find .build -name '*.xctest' -type f 2>/dev/null | head -1)
          chmod +x "$SWIFT_XCTEST"

          EXIT_CODE=1
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== Attempt $attempt / $MAX_ATTEMPTS ==="
            if "$SWIFT_XCTEST" SignalRClientIntegrationTests.IntegrationTests; then
              EXIT_CODE=0; break
            fi
            echo "Attempt $attempt failed."
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              WAIT=$((RANDOM % 11 + 5))
              echo "Retrying in ${WAIT}s..."
              sleep $WAIT
            fi
          done

          echo "--- Server log ---"
          cat /tmp/server.log || true
          kill $SERVER_PID 2>/dev/null || true
          exit $EXIT_CODE

  test-swift-macos:
    name: Swift (macOS)
    needs: build
    runs-on: macos-14
    steps:
      - name: Checkout (for test server source)
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: e2e-artifacts-stable
          path: artifacts

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.0'

      - name: Start test server (from source)
        env:
          Azure__SignalR__ConnectionString: ${{ secrets.E2E_CONNECTION_STRING }}
          ASPNETCORE_URLS: http://localhost:8080
        run: |
          if [[ -z "${Azure__SignalR__ConnectionString:-}" ]]; then
            echo "::warning::E2E_CONNECTION_STRING secret not set – skipping"
            exit 0
          fi
          cd server
          dotnet run -c Release -p:DefineConstants="USE_AZURE_SIGNALR" > /tmp/server.log 2>&1 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          for i in {1..30}; do
            HTTP_CODE=$(curl -sf -o /dev/null -w '%{http_code}' "http://localhost:8080/test-swift" 2>/dev/null || true)
            if [[ -n "$HTTP_CODE" && "$HTTP_CODE" != "000" ]]; then
              echo "Server ready (HTTP $HTTP_CODE)"
              break
            fi
            sleep 1
          done

      - name: Run Swift E2E tests
        env:
          E2E_CONNECTION_STRING: ${{ secrets.E2E_CONNECTION_STRING }}
          SIGNALR_INTEGRATION_TEST_URL: http://localhost:8080/test-swift
        run: |
          if [[ -z "${E2E_CONNECTION_STRING:-}" ]]; then exit 0; fi
          cd artifacts/swift
          rm -rf .build

          EXIT_CODE=1
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== Attempt $attempt / $MAX_ATTEMPTS ==="
            if swift test --filter SignalRClientIntegrationTests; then
              EXIT_CODE=0; break
            fi
            echo "Attempt $attempt failed."
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              WAIT=$((RANDOM % 11 + 5))
              echo "Retrying in ${WAIT}s..."
              sleep $WAIT
            fi
          done

          echo "--- Server log ---"
          cat /tmp/server.log || true
          kill ${SERVER_PID:-0} 2>/dev/null || true
          exit $EXIT_CODE

  # ═══════════════════════════════════════════════════════════════════════════
  #  Summary — aggregate results and update badge
  # ═══════════════════════════════════════════════════════════════════════════
  summary:
    name: Summary
    needs: [test-dotnet-default, test-dotnet-serverless, test-java, test-swift-linux, test-swift-macos]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Calculate results
        id: results
        run: |
          echo ""
          echo "════════════════════════════════════════════════════════════"
          echo "Client E2E (Stable SDK) — Summary"
          echo "════════════════════════════════════════════════════════════"

          echo ""
          echo "── Individual job results ──"
          echo "  .NET (Default Mode):    ${{ needs.test-dotnet-default.result }}"
          echo "  .NET (Serverless Mode): ${{ needs.test-dotnet-serverless.result }}"
          echo "  Java:                   ${{ needs.test-java.result }}"
          echo "  Swift (Ubuntu):         ${{ needs.test-swift-linux.result }}"
          echo "  Swift (macOS):          ${{ needs.test-swift-macos.result }}"

          PASSED=0; TOTAL=5
          [[ "${{ needs.test-dotnet-default.result }}" == "success" ]] && ((PASSED++)) || true
          [[ "${{ needs.test-dotnet-serverless.result }}" == "success" ]] && ((PASSED++)) || true
          [[ "${{ needs.test-java.result }}" == "success" ]] && ((PASSED++)) || true
          [[ "${{ needs.test-swift-linux.result }}" == "success" ]] && ((PASSED++)) || true
          [[ "${{ needs.test-swift-macos.result }}" == "success" ]] && ((PASSED++)) || true
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          if [[ $PASSED -eq $TOTAL ]]; then echo "color=brightgreen" >> "$GITHUB_OUTPUT"
          elif [[ $PASSED -gt 0 ]]; then echo "color=yellow" >> "$GITHUB_OUTPUT"
          else echo "color=red" >> "$GITHUB_OUTPUT"; fi

          echo ""
          echo "── Result: $PASSED/$TOTAL passed ──"
          echo ""

      - name: Job summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Stable SDK — ${{ steps.results.outputs.passed }}/${{ steps.results.outputs.total }} tests passed

          | Test | Status |
          |------|--------|
          | .NET (Default Mode) | ${{ needs.test-dotnet-default.result == 'success' && '✅' || '❌' }} |
          | .NET (Serverless Mode) | ${{ needs.test-dotnet-serverless.result == 'success' && '✅' || '❌' }} |
          | Java | ${{ needs.test-java.result == 'success' && '✅' || '❌' }} |
          | Swift (Ubuntu) | ${{ needs.test-swift-linux.result == 'success' && '✅' || '❌' }} |
          | Swift (macOS) | ${{ needs.test-swift-macos.result == 'success' && '✅' || '❌' }} |
          EOF

      - name: Update badge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PASSED=${{ steps.results.outputs.passed }}
          TOTAL=${{ steps.results.outputs.total }}
          COLOR=${{ steps.results.outputs.color }}

          echo "── Updating stable badge on badges branch ──"
          echo "  Badge content: ${PASSED}/${TOTAL} passed (color: ${COLOR})"

          # Try to clone the badges branch; create it if it doesn't exist
          git clone --single-branch --branch badges \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" \
            badge-repo 2>/dev/null || {
            echo "  ⚠ badges branch not found — creating new orphan branch"
            mkdir -p badge-repo && cd badge-repo
            git init && git checkout --orphan badges
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
            cd ..
          }

          cd badge-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BADGE_JSON="{\"schemaVersion\":1,\"label\":\"Stable SDK\",\"message\":\"${PASSED}/${TOTAL} passed\",\"color\":\"${COLOR}\"}"
          echo "$BADGE_JSON" > stable.json
          echo "  Badge JSON: $BADGE_JSON"

          git add stable.json
          git diff --cached --quiet && echo "  (no change to badge)" || {
            git commit -m "Update stable badge: ${PASSED}/${TOTAL} passed"
            git push origin badges 2>/dev/null || git push --set-upstream origin badges
            echo "  ✓ Badge pushed to badges branch"
          }
